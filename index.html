<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>קמינו פורטוגז - 50 יום הולדת 🥾</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  :root {
    --bg: #f7f4ef;
    --panel: #ffffff;
    --ink: #2b2620;
    --muted: #6b6358;
    --accent: #c1502e;
    --border: #e4ddd0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  #app { display: flex; height: 100vh; }
  #sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--panel);
    border-left: 1px solid var(--border);
    overflow-y: auto;
    padding: 20px;
  }
  #map { flex: 1; }
  h1 {
    font-size: 20px;
    margin: 0 0 4px;
    color: var(--ink);
  }
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .controls {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
  }
  .btn {
    flex: 1;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 8px;
    font-size: 12px;
    cursor: pointer;
    color: var(--ink);
  }
  .btn:hover { background: #f1ece2; }
  .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .day-card {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 10px;
    cursor: pointer;
    transition: box-shadow .15s;
  }
  .day-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
  .day-card.selected { border-color: var(--accent); background: #fbf1ec; }
  .day-num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    margin-left: 8px;
  }
  .day-title { font-weight: 600; font-size: 14px; }
  .day-date { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .day-notes { font-size: 12px; color: var(--muted); margin-top: 6px; line-height: 1.5; }
  .legend {
    font-size: 11px;
    color: var(--muted);
    margin-top: 20px;
    border-top: 1px solid var(--border);
    padding-top: 12px;
  }
  .leaflet-popup-content { direction: rtl; font-size: 13px; }
  @media (max-width: 720px) {
    #app { flex-direction: column; }
    #sidebar { width: 100%; min-width: 0; max-height: 42vh; border-left: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1>קמינו פורטוגז 🥾</h1>
    <div class="subtitle">מסלול יומולדת 50 · 8 ימים · פורטו → סנטיאגו דה קומפוסטלה</div>
    <div class="controls">
      <button class="btn active" id="btnAll">כל המסלול</button>
      <button class="btn" id="btnFit">התמקד</button>
    </div>
    <div id="dayList"></div>
    <div class="legend">💡 לחיצה על יום מסמנת אותו במפה בלבד. "כל המסלול" מציג את כל שמונת הימים יחד עם קו החיבור המלא.</div>
  </div>
  <div id="map"></div>
</div>

<script>
const days = [
  {
    n: 1, title: "טיסה TLV → פורטו", date: "7/9 - יום שני",
    notes: "✈ LY0373 · המראה 15:05 (טרמינל 3) · נחיתה 19:05 · הזמנה HZIKLB / 75FP9V<br>🏨 לינה: HF Tuela Porto — Rua Arquitecto Marques Da Silva 200, 4150-483 Porto · +351 22 619 4105",
    color: "#c1502e",
    stops: [{name:"HF Tuela Porto", lat:41.1545741, lng:-8.6305493, note:"מקום הלינה · +351 22 619 4105"}]
  },
  {
    n: 2, title: "אוטובוס פורטו → ויגו", date: "8/9 - יום שלישי",
    notes: "🚌 ALSA · יציאה 14:30 מ-Casa da Música · הגעה 17:50 לתחנה המרכזית בויגו · ללא הזמנת מקום, €11 לאדם · אסמכתא 1g4ia7p<br>🏨 לינה: NH Collection Vigo — Avenida García Barbón 17-19, 36201 Vigo · +34 986 43 36 43",
    color: "#d9822b",
    stops: [
      {name:"Casa da Música (יציאה)", lat:41.1611017, lng:-8.6296999, note:"תחנת אוטובוס ALSA · יציאה 14:30"},
      {name:"NH Collection Vigo", lat:42.23728, lng:-8.71842, note:"מקום הלינה · +34 986 43 36 43"}
    ]
  },
  {
    n: 3, title: "תחילת הקמינו - מסלול החוף", date: "9/9 - יום רביעי",
    notes: "🥾 הליכה מוויגו לרדונדלה (כ-15 ק\"מ)<br>🏨 לינה: Rubín 21 — Rúa Xeneral Rubín 21, 36800 Redondela · +34 663 69 68 47",
    color: "#c9a227",
    stops: [{name:"Vigo", lat:42.2340821, lng:-8.7137709, note:"התחלה"},{name:"Rubín 21, Redondela", lat:42.2863192, lng:-8.6094215, note:"מקום הלינה · +34 663 69 68 47"}]
  },
  {
    n: 4, title: "רדונדלה → פונטוורדה", date: "10/9 - יום חמישי",
    notes: "🥾 הליכה מרדונדלה לפונטוורדה (דרך ארקדה)<br>🏨 לינה: La Fonda — Rúa Isabel II 6, 36002 Pontevedra · +34 645 18 20 92",
    color: "#5a8f4f",
    stops: [{name:"Redondela", lat:42.2863192, lng:-8.6094215, note:"התחלה"},{name:"La Fonda, Pontevedra", lat:42.43351, lng:-8.6454936, note:"מקום הלינה · +34 645 18 20 92"}]
  },
  {
    n: 5, title: "פונטוורדה → פדרון", date: "11/9 - יום שישי",
    notes: "🥾 הליכה מפונטוורדה לפדרון<br>🏨 לינה: Luxury Singular Apartments Padrón — Costa Rincón 1, 15900 Padrón · +34 682 43 38 07",
    color: "#3f7f6e",
    stops: [{name:"Pontevedra", lat:42.43351, lng:-8.6454936, note:"התחלה"},{name:"Luxury Singular Apartments, Padrón", lat:42.7383808, lng:-8.6630817, note:"מקום הלינה · +34 682 43 38 07"}]
  },
  {
    n: 6, title: "פדרון → (לילה טרם הוזמן)", date: "12/9 - יום שבת",
    notes: "🥾 הליכה מפדרון לכיוון סנטיאגו<br>⚠️ הלילה הזה עדיין לא הוזמן! לפי התכנון המקורי - אזור טאו (Teo), כ-12 ק\"מ מפדרון",
    color: "#3d6ea5",
    stops: [{name:"Padrón", lat:42.7383808, lng:-8.6630817, note:"התחלה"},{name:"Teo (הצעה - טרם הוזמן)", lat:42.8060726, lng:-8.5611142, note:"⚠️ לינה לא מוזמנת עדיין"}]
  },
  {
    n: 7, title: "סנטיאגו דה קומפוסטלה!", date: "13/9 - יום ראשון",
    notes: "🥾 הליכה לסנטיאגו - סיום הקמינו! 🎉<br>🏨 לינה: Hotel San Miguel — Praza de San Miguel dos Agros 9, 15704 Santiago · +34 981 55 57 79",
    color: "#6a4c93",
    stops: [{name:"Teo", lat:42.8060726, lng:-8.5611142, note:"התחלה"},{name:"Hotel San Miguel, Santiago", lat:42.8821488, lng:-8.5429669, note:"מקום הלינה · +34 981 55 57 79"}]
  },
  {
    n: 8, title: "אוטובוס לפורטו + טיסה הביתה", date: "14/9 - יום שני",
    notes: "🚌 ALSA (bus 3491) · יציאה 12:30 מסנטיאגו · הגעה 14:50 לשדה התעופה פורטו · מקומות 7 (Eran) ו-8 (Yuval), €36 לאדם · אסמכתא 1g8g1th<br>✈ LY0374 פורטו → TLV · המראה 20:25 · נחיתה 03:45 (15/9)",
    color: "#8a8378",
    stops: [{name:"Hotel San Miguel, Santiago", lat:42.8821488, lng:-8.5429669, note:"התחלה"},{name:"Porto Airport (OPO)", lat:41.2481, lng:-8.6814, note:"טיסה הביתה LY0374 · 20:25"}]
  }
];

const map = L.map('map', { zoomControl: true }).setView([42.55, -8.6], 8.3);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap contributors',
  maxZoom: 18
}).addTo(map);

let dayLayers = []; // { layerGroup, bounds }
let allBoundsPoints = [];

// Days walked on the Camino itself use foot routing; the bus/transit legs use driving routing.
const drivingDays = new Set([2, 8]); // Porto->Vigo train and Santiago->Porto airport bus are not walked stages.
// Note: there's no free public train-routing API, so these two legs are approximated using
// road-network routing (closest publicly available corridor), not literal rail tracks.

async function fetchRouteGeometry(latlngs, profile) {
  // profile: 'foot' or 'car'. Uses OSM's public routing service (no API key needed).
  const coords = latlngs.map(([lat, lng]) => `${lng},${lat}`).join(';');
  const url = `https://routing.openstreetmap.de/routed-${profile}/route/v1/${profile === 'foot' ? 'foot' : 'driving'}/${coords}?overview=full&geometries=geojson`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error('routing failed');
    const data = await res.json();
    if (!data.routes || !data.routes.length) throw new Error('no route');
    // GeoJSON coords are [lng, lat] -> convert to [lat, lng] for Leaflet
    return data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
  } catch (e) {
    console.warn('Routing failed, falling back to straight line for', profile, e);
    return latlngs; // fallback: straight line
  }
}

async function buildDay(day) {
  const group = L.layerGroup();
  const latlngs = day.stops.map(s => [s.lat, s.lng]);
  latlngs.forEach(p => allBoundsPoints.push(p));

  // route line — real path when there's more than one stop
  if (latlngs.length > 1) {
    const profile = drivingDays.has(day.n) ? 'car' : 'foot';
    const routedLine = await fetchRouteGeometry(latlngs, profile);
    L.polyline(routedLine, {
      color: day.color,
      weight: 4,
      opacity: 0.85,
      dashArray: profile === 'car' ? '2,8' : null
    }).addTo(group);
  }

  // markers
  day.stops.forEach((s) => {
    const marker = L.circleMarker([s.lat, s.lng], {
      radius: 8,
      fillColor: day.color,
      color: '#fff',
      weight: 2,
      fillOpacity: 1
    }).addTo(group);
    marker.bindPopup(`<b>יום ${day.n}: ${day.title}</b><br>${s.name}<br><span style="color:#6b6358">${s.note}</span>`);
  });

  group.addTo(map);
  dayLayers.push({ day, group });
}

function fitAll() {
  if (allBoundsPoints.length) map.fitBounds(allBoundsPoints, { padding: [40, 40] });
}

(async () => {
  for (const day of days) {
    await buildDay(day);
  }
  fitAll();
})();

// Sidebar day list
const dayListEl = document.getElementById('dayList');
let selectedDay = null;

days.forEach(day => {
  const card = document.createElement('div');
  card.className = 'day-card';
  card.innerHTML = `
    <div style="display:flex;align-items:center;">
      <span class="day-num" style="background:${day.color}">${day.n}</span>
      <span class="day-title">${day.title}</span>
    </div>
    <div class="day-date">${day.date}</div>
    <div class="day-notes">${day.notes}</div>
  `;
  card.addEventListener('click', () => {
    document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
    card.classList.add('selected');
    selectedDay = day;
    const entry = dayLayers.find(d => d.day.n === day.n);
    const pts = day.stops.map(s => [s.lat, s.lng]);
    map.fitBounds(pts, { padding: [80, 80], maxZoom: 14 });
    document.getElementById('btnAll').classList.remove('active');
  });
  dayListEl.appendChild(card);
});

document.getElementById('btnAll').addEventListener('click', () => {
  document.querySelectorAll('.day-card').forEach(c => c.classList.remove('selected'));
  document.getElementById('btnAll').classList.add('active');
  fitAll();
});
document.getElementById('btnFit').addEventListener('click', fitAll);
</script>
</body>
</html>
